<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Until Our Next Adventure ♡</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="countdown-card">
    <img
      src="Portrait_Lines.png"
      alt="Portrait"
      class="portrait"
    >

    <p class="eyebrow">Until our next adventure</p>

    <h1>Nur noch ...</h1>

    <section class="countdown" aria-label="Countdown">
      <div>
        <span id="days">0</span>
        <small>Tage</small>
      </div>

      <div>
        <span id="hours">0</span>
        <small>Stunden</small>
      </div>

      <div>
        <span id="minutes">0</span>
        <small>Minuten</small>
      </div>

      <div>
        <span id="seconds">0</span>
        <small>Sekunden</small>
      </div>
    </section>

    <p class="message">
      Mexico · Guatemala · Costa Rica ♡
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
